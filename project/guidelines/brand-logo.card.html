<!DOCTYPE html>
<html lang="en" style="color: rgb(215, 0, 0)">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--surface-card); font-family: var(--font-body); }
  .wrap { display: flex; height: 180px; }
  .dark { flex: 1.6; background: var(--ink-900); display:flex; align-items:center; padding-left: 28px; }
  .dark img { height: 64px; }
  .tint { flex: 1; background: var(--surface-tint); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
  .tint img { height: 72px; width: 72px; object-fit: contain; }
  .lbl { font-size: 11px; color: var(--text-secondary); font-weight:600; }
</style>
</head>
<body style="font-family: -apple-system">
  <div class="wrap">
    <div class="dark"><img src="../assets/logo-lockup-dark.png" alt="RTL Poultry Farming ERP"></div>
    <div class="tint"><img src="../assets/logo-mark.png" alt="hen mark"><div class="lbl">App / favicon mark</div></div>
  </div>
</body>
</html>
