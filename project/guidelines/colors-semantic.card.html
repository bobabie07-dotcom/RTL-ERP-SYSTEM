<!-- @dsCard group="Colors" viewport="700x160" name="Semantic States" subtitle="Success, danger, warning, info — value + soft background pair" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-card); font-family: var(--font-body); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 44px; border-radius: var(--radius-md); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:#fff; }
  .bg { height: 28px; border-radius: var(--radius-sm); margin-top:6px; display:flex; align-items:center; padding:0 10px; font-size:11px; font-weight:600; }
  .name { font-size: 12px; font-weight: 600; color: var(--text-strong); margin-top: 8px; }
  .hex { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background:var(--success)">Success</div>
      <div class="bg" style="background:var(--success-bg); color:var(--success)">In Stock</div>
      <div class="name">success</div><div class="hex">#1F9A55 / #E7F5EC</div>
    </div>
    <div class="sw">
      <div class="chip" style="background:var(--danger)">Danger</div>
      <div class="bg" style="background:var(--danger-bg); color:var(--danger)">High Mortality</div>
      <div class="name">danger</div><div class="hex">#EF4444 / #FDECEC</div>
    </div>
    <div class="sw">
      <div class="chip" style="background:var(--warning)">Warning</div>
      <div class="bg" style="background:var(--warning-bg); color:var(--warning)">Low Stock</div>
      <div class="name">warning</div><div class="hex">#F59E0B / #FEF3E2</div>
    </div>
    <div class="sw">
      <div class="chip" style="background:var(--info)">Info</div>
      <div class="bg" style="background:var(--info-bg); color:var(--info)">Scheduled</div>
      <div class="name">info</div><div class="hex">#3B82F6 / #E8F0FE</div>
    </div>
  </div>
</body>
</html>
