<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Slate gray ramp — text, borders, workspace surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-card); font-family: var(--font-body); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; }
  .chip { height: 52px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  .name { font-size: 11px; font-weight: 600; color: var(--text-strong); margin-top: 7px; }
  .hex { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--gray-50)"></div><div class="name">gray-50</div><div class="hex">F9FAFB</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-100)"></div><div class="name">gray-100</div><div class="hex">F3F4F6</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-200)"></div><div class="name">gray-200</div><div class="hex">E5E7EB</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-300)"></div><div class="name">gray-300</div><div class="hex">D1D5DB</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-400)"></div><div class="name">gray-400</div><div class="hex">9CA3AF</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-500)"></div><div class="name">gray-500</div><div class="hex">6B7280</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-700)"></div><div class="name">gray-700</div><div class="hex">374151</div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-900)"></div><div class="name">gray-900</div><div class="hex">111827</div></div>
  </div>
</body>
</html>
