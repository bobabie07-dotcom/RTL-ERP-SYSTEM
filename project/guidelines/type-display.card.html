<!-- @dsCard group="Type" viewport="700x230" name="Display — Poppins" subtitle="Rounded geometric sans for headings, slogans & hero" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-card); font-family: var(--font-display); color: var(--text-strong); }
  .hero { font-size: 40px; font-weight: 700; line-height: 1.05; letter-spacing: -0.02em; }
  .hero .accent { color: var(--green-400); }
  .h1 { font-size: 24px; font-weight: 700; margin-top: 14px; }
  .h2 { font-size: 20px; font-weight: 600; color: var(--text-body); margin-top: 6px; }
  .meta { font-family: var(--font-body); font-size: 11px; color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <div class="hero">Manage Smarter.<br><span class="accent">Farm Better.</span></div>
  <div class="h1">Batch Management — H1 / 24px / 700</div>
  <div class="h2">Feed Consumption — H2 / 20px / 600</div>
  <div class="meta">Poppins · weights 400–800 · letter-spacing −0.02em on large sizes</div>
</body>
</html>
