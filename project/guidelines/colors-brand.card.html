<!-- @dsCard group="Colors" viewport="700x150" name="Brand Greens" subtitle="Primary green spine — buttons, active states, wordmark accent" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-card); font-family: var(--font-body); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.04); }
  .name { font-size: 12px; font-weight: 600; color: var(--text-strong); margin-top: 8px; }
  .hex { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
  .tag { display:inline-block; font-size:10px; color: var(--text-muted); margin-top:2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--green-50)"></div><div class="name">green-50</div><div class="hex">#E7F5EC</div></div>
    <div class="sw"><div class="chip" style="background:var(--green-100)"></div><div class="name">green-100</div><div class="hex">#C9EAD5</div></div>
    <div class="sw"><div class="chip" style="background:var(--green-300)"></div><div class="name">green-300</div><div class="hex">#6CC592</div></div>
    <div class="sw"><div class="chip" style="background:var(--green-400)"></div><div class="name">green-400 · accent</div><div class="hex">#2FAC64</div></div>
    <div class="sw"><div class="chip" style="background:var(--green-500)"></div><div class="name">green-500 · PRIMARY</div><div class="hex">#1F9A55</div></div>
    <div class="sw"><div class="chip" style="background:var(--green-600)"></div><div class="name">green-600 · hover</div><div class="hex">#17813F</div></div>
    <div class="sw"><div class="chip" style="background:var(--green-700)"></div><div class="name">green-700</div><div class="hex">#126534</div></div>
  </div>
</body>
</html>
