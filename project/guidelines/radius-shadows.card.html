<!-- @dsCard group="Spacing" viewport="700x170" name="Radius & Shadows" subtitle="Corner radii and the soft low-contrast shadow set" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); font-family: var(--font-body); }
  .row { display: flex; gap: 22px; align-items: center; }
  .box { width: 88px; height: 64px; background: var(--surface-card); display:flex; align-items:center; justify-content:center; font-size:11px; color: var(--text-muted); }
  .b1 { border-radius: var(--radius-sm); border:1px solid var(--border); }
  .b2 { border-radius: var(--radius-md); border:1px solid var(--border); }
  .b3 { border-radius: var(--radius-lg); border:1px solid var(--border); }
  .s1 { border-radius: var(--radius-lg); box-shadow: var(--shadow-card); }
  .s2 { border-radius: var(--radius-lg); box-shadow: var(--shadow-md); }
  .s3 { border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); }
  .cap { font-size: 11px; font-weight: 600; color: var(--text-strong); text-align:center; margin-top:8px; }
</style>
</head>
<body>
  <div class="row">
    <div><div class="box b1">6px</div><div class="cap">sm</div></div>
    <div><div class="box b2">10px</div><div class="cap">md</div></div>
    <div><div class="box b3">14px</div><div class="cap">lg</div></div>
    <div style="width:1px;height:80px;background:var(--border)"></div>
    <div><div class="box s1">card</div><div class="cap">shadow-card</div></div>
    <div><div class="box s2">menu</div><div class="cap">shadow-md</div></div>
    <div><div class="box s3">dialog</div><div class="cap">shadow-lg</div></div>
  </div>
</body>
</html>
