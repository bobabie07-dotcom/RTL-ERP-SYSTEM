<!-- @dsCard group="Components" viewport="700x360" name="Data — StatCard, Card, Table, Ring" subtitle="KPI tiles, content card, list table, progress ring" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; padding:24px; background:var(--surface-page); font-family:var(--font-body); }
  .stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:18px; }
  .lower { display:grid; grid-template-columns:1fr 200px; gap:16px; align-items:start; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { StatCard, Card, DataTable, ProgressRing, Badge } = window.RTLPoultryFarmingERPDesignSystem_698a73;
const S = ({d,w=22}) => <svg width={w} height={w} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{__html:d}}/>;
const Bird = <S d='<path d="M16 7h.01"/><path d="M3.4 18H12a8 8 0 0 0 8-8V7a4 4 0 0 0-7.28-2.3L2 20"/><path d="m20 7 2 .5-2 .5"/><path d="M10 18v3"/><path d="M14 17.75V21"/><path d="M7 18a6 6 0 0 0 3.84-10.61"/>'/>;
const Heart = <S d='<path d="M20.42 4.58a5.4 5.4 0 0 0-7.65 0L12 5.35l-.77-.77a5.4 5.4 0 0 0-7.65 7.65l.77.77L12 21l7.65-7.65.77-.77a5.4 5.4 0 0 0 0-7.65z"/>'/>;
const Trend = <S d='<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>'/>;

const batches = [
  { batch:'BATCH-2025-08', farm:'RTL Main Farm', mort:'3.45%', fcr:'1.62', status:'Active' },
  { batch:'BATCH-2025-07', farm:'RTL North Farm', mort:'4.12%', fcr:'1.65', status:'Active' },
  { batch:'BATCH-2025-06', farm:'RTL East Farm', mort:'4.28%', fcr:'1.70', status:'Active' },
];

function Demo() {
  return (
    <div>
      <div className="stats">
        <StatCard label="Total Birds" value="48,250" icon={Bird} delta="5.6%" deltaDir="up" />
        <StatCard label="Mortality Rate" value="4.21%" tone="red" icon={Heart} delta="0.6%" deltaDir="down" deltaGood />
        <StatCard label="Revenue (₱)" value="₱6,780,000" icon={Trend} delta="12.4%" deltaDir="up" />
      </div>
      <div className="lower">
        <Card title="Top Performing Batches">
          <DataTable
            columns={[
              { key:'batch', header:'Batch No.', strong:true },
              { key:'farm', header:'Farm' },
              { key:'mort', header:'Mortality %', align:'right', numeric:true },
              { key:'fcr', header:'FCR', align:'right', numeric:true },
              { key:'status', header:'Status', render:r=><Badge tone="success" dot>{r.status}</Badge> },
            ]}
            rows={batches} rowKey="batch"
          />
        </Card>
        <Card title="Batch Progress" style={{textAlign:'center'}} bodyStyle={{display:'flex',justifyContent:'center',padding:'20px 0'}}>
          <ProgressRing value={61} label="of duration" />
        </Card>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
