<!-- @dsCard group="Components" viewport="700x300" name="Forms — Input, Select, Checkbox" subtitle="Text field with icon, password reveal, error; dropdown; checkbox" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; padding:24px; background:var(--surface-card); font-family:var(--font-body); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:18px 24px; align-items:start; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Checkbox, IconButton } = window.RTLPoultryFarmingERPDesignSystem_698a73;
const S = ({d,w=18}) => <svg width={w} height={w} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{__html:d}}/>;
const User = <S d='<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>'/>;
const Lock = <S d='<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>'/>;
const Eye = <S d='<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/>'/>;

function Demo() {
  const [remember, setRemember] = React.useState(true);
  return (
    <div className="grid">
      <Input label="Username" placeholder="Enter your username" icon={User} defaultValue="admin" />
      <Input label="Password" type="password" placeholder="Enter your password" icon={Lock}
        trailing={<IconButton size="sm">{Eye}</IconButton>} defaultValue="secret" />
      <Select label="Selected Farm" options={['RTL Main Farm','RTL North Farm','All Farms']} />
      <Input label="Cost per Chick (₱)" defaultValue="" placeholder="0.00" error="This field is required" />
      <div style={{display:'flex',gap:24,alignItems:'center',gridColumn:'1 / -1'}}>
        <Checkbox label="Remember me" checked={remember} onChange={e=>setRemember(e.target.checked)} />
        <Checkbox label="Disabled" checked={false} disabled />
        <Checkbox label="Selected" checked={true} onChange={()=>{}} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
